apiVersion: batch/v1
kind: Job
metadata:
  name: opdd-{{ORX_RUN}}
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 39600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: reproduce
          image: pytorch/pytorch:2.8.0-cuda12.8-cudnn9-runtime
          command: ["bash", "-c", "eval \"$ORX_SCRIPT\""]
          resources:
            requests:
              nvidia.com/gpu: "8"
              cpu: "96"
              memory: "700Gi"
            limits:
              nvidia.com/gpu: "8"
              cpu: "120"
              memory: "850Gi"
